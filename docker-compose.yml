services:
  postgres:
    image: postgres:16-alpine
    container_name: istore-postgres
    environment:
      POSTGRES_DB: istore
      POSTGRES_USER: istore
      POSTGRES_PASSWORD: istore
    ports:
      - "5432:5432"
    volumes:
      - istore-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U istore -d istore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  istore-postgres-data:
